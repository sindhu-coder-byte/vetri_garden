{% extends 'base.html' %}
{% load static %}

{% block title %}Message Sent • Vetri Garden{% endblock %}

{% block content %}
<main class="min-h-screen bg-[#E8ECD7] flex items-center justify-center px-6 py-16">
  <div class="bg-white rounded-3xl shadow-lg border border-[#1f4529]/10 p-10 sm:p-14 text-center max-w-lg w-full">

    <!-- Icon -->
    <div class="w-20 h-20 bg-[#1f4529] rounded-full flex items-center justify-center mx-auto mb-6 shadow-md">
      <svg class="w-10 h-10 text-[#ffc911]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <h1 class="text-2xl sm:text-3xl font-bold text-[#1f4529] mb-2">Thank you, {{ name }}!</h1>
    <p class="text-[#1f4529]/60 text-sm sm:text-base leading-relaxed mb-8">
      Your message has been sent successfully.<br>
      Our team will get back to you within <span class="font-semibold text-[#1f4529]">24 hours</span>.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="{% url 'home' %}"
         class="px-8 py-3 bg-[#1f4529] text-white font-bold rounded-full text-sm
                hover:bg-[#ffc911] hover:text-[#1f4529] transition duration-300 shadow-md">
        Back to Home
      </a>
      <a href="{% url 'contact' %}"
         class="px-8 py-3 border-2 border-[#1f4529] text-[#1f4529] font-bold rounded-full text-sm
                hover:bg-[#1f4529] hover:text-white transition duration-300">
        Send Another
      </a>
    </div>

  </div>
</main>
{% endblock %}
