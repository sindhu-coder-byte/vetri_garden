services:
  - type: web
    name: vetri-garden
    env: python
    region: singapore
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      npm install &&
      npm run build:css &&
      python manage.py collectstatic --no-input &&
      python manage.py migrate
    startCommand: gunicorn vetri_garden.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "vetri-garden.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: vetri-garden-db
          property: connectionString
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: vetri-garden-db
    plan: free
    region: singapore
